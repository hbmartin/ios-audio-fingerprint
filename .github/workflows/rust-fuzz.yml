name: Rust Fuzz Smoke

# The cargo-fuzz targets under rust/fuzz feed untrusted bytes into the
# serialization and audio-decode entry points. This scheduled smoke run keeps
# them compiling and gives each a short libFuzzer budget so regressions in the
# fully-untrusted parsing paths surface without waiting for a manual run.

on:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz-smoke:
    name: Fuzz smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fingerprint_from_bytes
          - decode_audio
    defaults:
      run:
        working-directory: rust/fuzz
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch pin, nightly toolchain
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz target
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=300

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: rust/fuzz/artifacts
          if-no-files-found: ignore
