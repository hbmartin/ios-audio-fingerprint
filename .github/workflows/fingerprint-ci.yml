name: Fingerprint CI

on:
  pull_request:
  push:
    branches:
      - main
      - rust-rewrite
      - claude/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fingerprint-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-lint:
    name: Lint Swift package
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Assert Swift 6.2+ toolchain
        run: scripts/assert-swift-toolchain.sh

      - name: Lint Swift sources
        run: swift format lint --strict --parallel --recursive Package.swift Sources Tests Benchmarks

  api-stability:
    name: Public API stability
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check public API surface against baseline
        run: python3 scripts/check-public-api.py

  build:
    name: Build and test Fingerprint
    runs-on: macos-26
    env:
      CARGO_TERM_COLOR: always
      FINGERPRINT_REQUIRE_ALL_SLICES: "1"
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      IPHONEOS_DEPLOYMENT_TARGET: "13.0"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Assert Swift 6.2+ toolchain
        run: scripts/assert-swift-toolchain.sh

      - name: Install Rust stable and Apple targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add \
            aarch64-apple-darwin \
            x86_64-apple-darwin \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios
          cargo --version
          rustc --version

      - name: Cache Cargo build state
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            rust/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Test Rust workspace
        run: cargo test --manifest-path rust/Cargo.toml --workspace --locked

      - name: Build Fingerprint xcframework
        run: scripts/build-rust-xcframework.sh

      - name: Verify Fingerprint xcframework
        run: scripts/verify-xcframework.sh Fingerprint.xcframework

      - name: Zip Fingerprint xcframework
        run: ditto -c -k --keepParent Fingerprint.xcframework Fingerprint.xcframework.zip

      - name: Build Swift package (warnings as errors)
        run: swift build --build-tests -Xswiftc -warnings-as-errors

      - name: Test Swift package on macOS
        run: swift test --skip FingerprintBenchmarkTests -Xswiftc -warnings-as-errors

      - name: Build Swift package for iOS device
        run: |
          xcodebuild \
            -scheme Fingerprint \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Build Swift package for iOS simulator
        run: |
          xcodebuild \
            -scheme Fingerprint \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Upload Fingerprint xcframework
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Fingerprint.xcframework
          path: Fingerprint.xcframework.zip
          if-no-files-found: error
          retention-days: 14
